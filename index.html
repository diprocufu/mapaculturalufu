  <script>
    // ===== MAPA E CAMADAS BASE =====
    const map = L.map('map').setView([-18.9186, -48.255], 15);
function calcularDistancia(lat1, lon1, lat2, lon2) {
  const R = 6371; // raio da Terra em km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c; // distância em km
}

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OSM',
      maxZoom: 22
    });

    const cartoLight = L.tileLayer('https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 22
    });

    const esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19
    });

    // Padrão: OSM
    osm.addTo(map);

    const baseMaps = {
      "OSM Padrão (Padrão)": osm,
      "Carto Light": cartoLight,
      "Esri Satélite": esriSat
    };

    L.control.layers(baseMaps).addTo(map);

    // ===== FUNÇÃO: Ícone Font Awesome por tipo =====
    function faFor(tipo) {
  const t = (tipo || '').toLowerCase();

  if (t.includes('teatro')) return 'masks-theater';       // 🎭
  if (t.includes('dança')) return 'person-running';       // 🕺
  if (t.includes('visuais')) return 'paintbrush';         // 🎨
  if (t.includes('música') || t.includes('música')) return 'music'; // 🎵
  if (t.includes('cinema')) return 'film';                // 🎬
  if (t.includes('galeria')) return 'image';              // 🖼️
  if (t.includes('museu')) return 'landmark';             // 🏛️
  if (t.includes('praça') || t.includes('praca')) return 'tree'; // 🌳
  if (t.includes('centro')) return 'building';            // 🏢
  if (t.includes('administr')) return 'building-columns'; // 🏛️
  if (t.includes('curso')) return 'graduation-cap';        // 🎓
  return 'map-pin';                                       // 📍 padrão
}

const todosOsMarcadores = [];

// ===== CARREGA ESPAÇOS =====
function gerarMenuDeCategoriasFixas(espacos) {
  const categoriasFixas = [
    "Mostrar todos", // ✅ botão para restaurar todos os espaços
    "Administrativo",
    "Centro Cultural",
    "Cinema",
    "Curso",
    "Galeria de Artes",
    "Museu",
    "Música",
    "Praça",
    "Teatro",
    "Outra"
  ];

  const container = document.getElementById("categorias-espacos");
  container.innerHTML = "";

  categoriasFixas.forEach(categoria => {
    const item = document.createElement("a");
    item.href = "#";
    item.textContent = categoria;
    item.onclick = () => {
      if (categoria === "Mostrar todos") {
        exibirTodosOsEspacos(espacos);
        console.log("Total de espaços recebidos:", espacos.length);
      } else {
        filtrarPorCategoria(espacos, categoria);
      }
    };
    container.appendChild(item);
  });
}

// ===== MAPA DE EQUIVALÊNCIA ENTRE NOMES DO MENU E FORMATOS DO JSON =====
const mapaFormatos = {
  "administrativo": "administrativo",
  "centro cultural": "centro",
  "cinema": "cinema",
  "curso": "curso",
  "galeria de artes": "galeria",
  "museu": "museu",
  "música": "música",
  "praça": "praça",
  "teatro": "teatro",
  "outra": "outro"
};

function filtrarPorCategoria(espacos, categoriaSelecionada) {
  todosOsMarcadores.forEach(({ marker }) => map.removeLayer(marker));
  todosOsMarcadores.length = 0;

  let filtrados = [];

  if (categoriaSelecionada.toLowerCase() === "curso") {
    filtrados = espacos.filter(e => e.nome.toLowerCase().includes("curso"));
  } else {
  const formatoEsperado = mapaFormatos[categoriaSelecionada.toLowerCase()];
  filtrados = espacos.filter(e => {
    const tipo = (e.formato || "").trim().toLowerCase();
    const nome = (e.nome || "").toLowerCase();
    return tipo === formatoEsperado && !nome.includes("curso");
  });
}

  console.log("Espaços filtrados:", filtrados.map(e => e.nome));

  if (filtrados.length === 0) {
    alert("Nenhum espaço encontrado para esta categoria.");
  }

  filtrados.forEach(espaco => {
  let icon = greenIcon;
  const categoria = (espaco.categoria || "").toLowerCase();

  if (categoria === "ufu") icon = blueIcon;
  else if (categoria === "privado") icon = redIcon;
  else if (categoria === "ponto de cultura") icon = purpleIcon;

    const marker = L.marker([espaco.latitude, espaco.longitude], { icon }).addTo(map);
    todosOsMarcadores.push({ marker, espaco });

    const telefone = espaco.telefone ? `<br><b>Tel.:</b> ${espaco.telefone}` : '';
    const site = espaco.site ? `<br><a href="${espaco.site}" target="_blank">Site oficial</a>` : '';
    const email = espaco.email ? `<br><b>Email:</b> <a href="mailto:${espaco.email}">${espaco.email}</a>` : '';

    marker.bindPopup(
      `<b>${espaco.nome}</b><br>${espaco.endereco || ''}${telefone}${site}${email}`
    );
  });
}

// ===== CARREGAMENTO DOS ARQUIVOS JSON =====
// Este bloco carrega os quatro arquivos de espaços culturais:
// - espacos.json → espaços da UFU
// - espacos_publicos.json → espaços públicos da cidade
// - espacos_privados.json → espaços privados da cidade
// - espacos_ponto_cultura.json → pontos de cultura
//
// Os dados são combinados em uma única lista temporária (todosEspacos)
// para alimentar o menu de categorias e aplicar filtros no mapa.
// Os arquivos continuam separados para facilitar manutenção e atualizações.

let todosEspacos = [];

function exibirTodosOsEspacos(espacos) {
  todosOsMarcadores.forEach(({ marker }) => map.removeLayer(marker));
  todosOsMarcadores.length = 0;

  console.log("Total de espaços recebidos:", espacos.length);

  espacos
    .filter(e => {
      const valido = e.tipo !== "separador" && e.latitude && e.longitude;
      if (!valido) {
        console.warn("Espaço ignorado:", e.nome, e);
      }
      return valido;
    })
    .forEach(espaco => {
      const tipo = (espaco.tipo || "").toLowerCase();
      const categoria = (espaco.categoria || "").toLowerCase();

      let icon = greenIcon;
      if (categoria === "ufu") icon = blueIcon;
      else if (tipo === "privado") icon = redIcon;
      else if (tipo === "ponto de cultura") icon = purpleIcon;
      else if (tipo === "público") icon = greenIcon;

      const marker = L.marker([espaco.latitude, espaco.longitude], { icon }).addTo(map);
      todosOsMarcadores.push({ marker, espaco });

      const telefone = espaco.telefone ? `<br><b>Tel.:</b> ${espaco.telefone}` : '';
      const site = espaco.site ? `<br><a href="${espaco.site}" target="_blank">Site oficial</a>` : '';
      const email = espaco.email ? `<br><b>Email:</b> <a href="mailto:${espaco.email}">${espaco.email}</a>` : '';

      marker.bindPopup(
        `<b>${espaco.nome}</b><br>${espaco.endereco || ''}${telefone}${site}${email}`
      ); 
    });
    document.getElementById("contador-espacos").textContent =
      `🧭 Exibidos: ${todosOsMarcadores.length} / Recebidos: ${espacos.length} / Total geral: ${todosEspacos.length}`;
}

Promise.all([
  fetch("espacos.json").then(r => r.json()),
  fetch("espacos_publicos.json").then(r => r.json()),
  fetch("espacos_privados.json").then(r => r.json()),
  fetch("espacos_ponto_cultura.json").then(r => r.json())
])

.then(([ufu, publicos, privados, pontos]) => {
  todosEspacos = [
    ...ufu.espacos,
    ...publicos.espacos,
    ...privados.espacos,
    ...pontos.espacos
  ];

  // Carregamento padrão da UFU
  const ordemCampiUFU = [
    "Santa Mônica",
    "Umuarama",
    "Educação Física",
    "Glória",
    "Ituiutaba",
    "Monte Carmelo",
    "Patos de Minas",
    "Distribuídos por Uberlândia"
  ];

  ufu.espacos
  .filter(e => {
    const valido = e.tipo !== "separador" && e.latitude && e.longitude;
    if (!valido) {
      console.warn("Espaço ignorado:", e.nome, e);
    }
    return valido;
  })

    .sort((a, b) => {
      const ca = ordemCampiUFU.indexOf(a.campus || "");
      const cb = ordemCampiUFU.indexOf(b.campus || "");
      return (ca === -1 ? 999 : ca) - (cb === -1 ? 999 : cb);
    })
    .forEach(espaco => {
      const icon = blueIcon;
      const marker = L.marker([espaco.latitude, espaco.longitude], { icon }).addTo(map);
      todosOsMarcadores.push({ marker, espaco });

      const telefone = espaco.telefone ? `<br><b>Tel.:</b> ${espaco.telefone}` : '';
      const site = espaco.site ? `<br><a href="${espaco.site}" target="_blank">Site oficial</a>` : '';
      const email = espaco.email ? `<br><b>Email:</b> <a href="mailto:${espaco.email}">${espaco.email}</a>` : '';

      let distanciaTexto = '';
      if (userMarker) {
        const userLat = userMarker.getLatLng().lat;
        const userLng = userMarker.getLatLng().lng;
        const dist = calcularDistancia(userLat, userLng, espaco.latitude, espaco.longitude);
        distanciaTexto = `<br><b>Distância aproximada:</b> ${dist.toFixed(2)} km`;
      }

      marker.bindPopup(
        `<b>${espaco.nome}</b><br>${espaco.endereco || ''}${telefone}${site}${email}${distanciaTexto}`
      );

      const campus = (espaco.campus || "Outro").trim();
      const campusId = "ufu-" + campus.toLowerCase().replace(/\s/g, "-");

      if (!document.getElementById(campusId)) {
        const titulo = document.createElement("div");
        titulo.id = campusId;
        titulo.className = "menu-titulo";
        titulo.innerHTML = `<strong>📍 ${campus}</strong>`;
        document.getElementById("espacos-ufu").appendChild(titulo);
      }

      const item = document.createElement("a");
      const iconName = faFor(espaco.formato);
      item.href = "#";
      item.innerHTML = `<i class="fa-solid fa-${iconName}"></i> ${espaco.nome}`;
      item.onclick = () => {
        map.setView([espaco.latitude, espaco.longitude], 18);
        marker.openPopup();
      };

      document.getElementById(campusId).appendChild(item);
    });

  // ✅ Gera o menu de categorias com todos os espaços
  gerarMenuDeCategoriasFixas(todosEspacos);
});
  
// ===== DROPDOWNS (abre e fecha corretamente) =====
document.querySelectorAll(".dropdown-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const parent = btn.parentElement;
    const isActive = parent.classList.contains("active");

    // Fecha todos os dropdowns
    document.querySelectorAll(".dropdown").forEach(drop => {
      drop.classList.remove("active");
    });

    // Se o clicado estava fechado, abre
    if (!isActive) {
      parent.classList.add("active");
    }
  });
});

    // ===== ÍCONES DE MARCADORES (azul UFU / verde Cidade) =====
    const blueIcon = new L.Icon({
      iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-icon.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const greenIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const redIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const purpleIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-violet.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    // ===== BOTÃO TELA CHEIA =====
    const fsButton = L.control({ position: 'topleft' });
    fsButton.onAdd = function () {
      const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
      div.innerHTML = '<a href="#" title="Tela cheia"><i class="fa-solid fa-expand"></i></a>';
      div.style.backgroundColor = 'white';
      div.style.width = '34px';
      div.style.height = '34px';
      div.style.display = 'flex';
      div.style.alignItems = 'center';
      div.style.justifyContent = 'center';
      div.style.cursor = 'pointer';

      div.onclick = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      };
      return div;
    };
    fsButton.addTo(map);

   // ===== ÍCONE DO USUÁRIO =====
const userIcon = new L.Icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-violet.png',
  shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

let userMarker = null;

document.getElementById("btn-localizacao").addEventListener("click", () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
  function (position) {
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;
    const precisao = position.coords.accuracy;

    if (userMarker) {
      map.removeLayer(userMarker);
    }

    userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
    todosOsMarcadores.forEach(({ marker, espaco }) => {
      const telefone = espaco.telefone ? `<br><b>Tel.:</b> ${espaco.telefone}` : '';
      const site = espaco.site ? `<br><a href="${espaco.site}" target="_blank">Site oficial</a>` : '';
      const email = espaco.email ? `<br><b>Email:</b> <a href="mailto:${espaco.email}">${espaco.email}</a>` : '';

      const userLat = userMarker.getLatLng().lat;
      const userLng = userMarker.getLatLng().lng;
      const dist = calcularDistancia(userLat, userLng, espaco.latitude, espaco.longitude);
      const distanciaTexto = `<br><br><b>Distância aproximada:</b> ${dist.toFixed(2)} km`;

      marker.bindPopup(
        `<b>${espaco.nome}</b><br>${espaco.endereco || ''}${telefone}${site}${email}${distanciaTexto}`
      );
    });

    userMarker.bindPopup(`📍 Você está aqui<br><small>Precisão estimada: ${precisao.toFixed(0)} metros</small>`).openPopup();
    map.setView([lat, lng], 16);
  },
  function (error) {
    alert(
      "📍 Não foi possível acessar sua localização.\n" +
      "→ Verifique se as permissões de localização estão ativadas para este navegador.\n" +
      "→ Em computadores, libere o acesso nas configurações do navegador.\n" +
      "→ Em celulares, ajuste as permissões de localização nas configurações do sistema.\n" +
      "→ Depois disso, recarregue a página e clique novamente no botão."
    );
  },
  {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  }
    );
  } else {
    alert("Geolocalização não suportada neste navegador.");
  }
});

function carregarCidade(tipo) {
  let arquivo = "";
  let containerId = "";

  if (tipo === "Público") {
    arquivo = "espacos_publicos.json";
    containerId = "espacos-publicos";
  } else if (tipo === "Privado") {
    arquivo = "espacos_privados.json";
    containerId = "espacos-privados";
  } else if (tipo === "Ponto de Cultura") {
    arquivo = "espacos_ponto_cultura.json";
    containerId = "espacos-ponto";
  }

  fetch(arquivo + '?nocache=' + new Date().getTime())
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById(containerId);
      container.innerHTML = ""; // limpa antes de carregar

      data.espacos.forEach(espaco => {
        const iconName = faFor(espaco.formato);
        let icon = greenIcon;
        if (tipo === "Privado") icon = redIcon;
        if (tipo === "Ponto de Cultura") icon = purpleIcon;

      const marker = L.marker([espaco.latitude, espaco.longitude], { icon }).addTo(map);

        todosOsMarcadores.push({ marker, espaco });

        const telefone = espaco.telefone ? `<br><b>Tel.:</b> ${espaco.telefone}` : '';
        const site = espaco.site ? `<br><a href="${espaco.site}" target="_blank">Site oficial</a>` : '';
        const email = espaco.email ? `<br><b>Email:</b> <a href="mailto:${espaco.email}">${espaco.email}</a>` : '';

        marker.bindPopup(
          `<b>${espaco.nome}</b><br>${espaco.endereco || ''}${telefone}${site}${email}`
        );

        const item = document.createElement("a");
        item.href = "#";
        item.innerHTML = `<i class="fa-solid fa-${iconName}"></i> ${espaco.nome}`;
        item.onclick = () => {
          map.setView([espaco.latitude, espaco.longitude], 18);
          marker.openPopup();
        };

        container.appendChild(item);
      });
    });
}
function mostrarSobre() {
  alert(
    "📍 Este mapa destaca os espaços culturais da Universidade Federal de Uberlândia (UFU).\n\n" +
